<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
    <h1>Pagina de cadastro</h1>
<body>
    <form>
        <fieldset>
            <legend>Crie sua conta</legend>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name=" nome"><br><br>
        
            <label for="email">E-mail:</label><br>
            <input type="email" ed="email" name="email" placeholder="crieseuemail@gmail.com" required><br><br>

            <label for="senha">Senha (minimo 8 caracteres):</label>
            <input type="senhas" id="senha" name="senha" minlength="8" required><br><br>
          
             <strong>Gênero:</strong><br>
    
             <input type="radio" id="feminino" name="genero" value="feminino">
             <label for="feminino">Feminino</label><br>

            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label><br><br>

            <label for="bio"><strong>Biografia:</strong></label><br>
            <textarea id="bio" name="bio" rows="4" placeholder="Fale um pouco sobre você..."></textarea><br><br>
        
            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Eu aceitos os termos de serviço. </label><br><br>

            
            
        </fieldset>
        <br>
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>


    </form>
</body>

</html>
